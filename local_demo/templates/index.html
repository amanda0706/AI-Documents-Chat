<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClausePilot</title>
    <style>
      :root { --bg:#f4f7fb; --ink:#172033; --line:#dbe3ee; --accent:#3f6ff2; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--ink); }
      .app { display:grid; grid-template-columns:250px 1fr; gap:20px; min-height:100vh; padding:20px; }
      .panel { background:#fff; border-radius:28px; padding:20px; box-shadow:0 18px 48px rgba(23,32,51,.08); }
      .brand { font-size:28px; font-weight:700; margin-bottom:24px; }
      button,.upload { border:0; border-radius:16px; padding:14px 16px; cursor:pointer; font:inherit; }
      .upload { display:block; text-align:center; color:#fff; background:var(--accent); margin-bottom:20px; }
      .nav button,.doc { width:100%; text-align:left; background:#f8fafc; margin-bottom:8px; }
      .nav button.active { background:#111827; color:#fff; }
      .workspace { display:grid; grid-template-columns:1fr 360px; gap:20px; }
      .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:20px; }
      .stat strong { display:block; margin-top:10px; font-size:32px; }
      .fragment,.risk,.suggestion,.difference { background:#f8fafc; border-radius:22px; padding:16px; margin-top:12px; }
      input,textarea,select { width:100%; border:1px solid var(--line); border-radius:16px; padding:14px; font:inherit; }
      textarea { min-height:100px; }
      .stack > * + * { margin-top:12px; }
      .tag { display:inline-block; padding:6px 10px; border-radius:999px; background:#fff3cd; margin-right:8px; font-size:12px; }
      .filters { display:flex; flex-wrap:wrap; gap:8px; margin:0 0 16px; }
      .filters button { padding:8px 12px; background:#eef2ff; font-size:12px; }
      .filters button.active { background:#111827; color:#fff; }
      .muted { color:#64748b; }
      .hidden { display:none; }
      @media (max-width: 980px) {
        .app,.workspace,.stats { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <div class="brand">ClausePilot</div>
        <label class="upload">Upload document<input id="file" type="file" accept=".pdf,.txt" hidden /></label>
        <nav class="nav">
          <button data-view="overview" class="active">Dashboard</button>
          <button data-view="document">Document</button>
          <button data-view="compare">Compare</button>
          <button data-view="suggestions">Suggestions</button>
        </nav>
        <h4>Documents</h4>
        <div class="filters">
          <button data-risk="all" class="active">All</button>
          <button data-risk="high">High</button>
          <button data-risk="medium">Medium</button>
          <button data-risk="low">Low</button>
        </div>
        <div class="filters">
          <button data-status="all" class="active">All status</button>
          <button data-status="draft">Draft</button>
          <button data-status="in_review">In review</button>
          <button data-status="approved">Approved</button>
        </div>
        <div id="documents"></div>
      </aside>
      <section>
        <div id="overview"></div>
        <div id="document" class="hidden"></div>
        <div id="compare" class="hidden"></div>
        <div id="suggestions" class="hidden"></div>
      </section>
    </main>
    <script>
      let documents = [];
      let selectedId = null;
      let messages = [];
      let riskFilter = 'all';
      let statusFilter = 'all';
      const $ = (id) => document.getElementById(id);
      async function api(path, options) { const r = await fetch(path, options); return r.json(); }
      async function load() {
        try { documents = await api('/api/documents'); }
        catch { documents = []; }
        selectedId ||= documents[0]?.id || null;
        renderSidebar(); renderOverview(); renderDocument(); renderCompare(); renderSuggestions();
      }
      function demoDocs() {
        return [
          {id:'demo-1',filename:'Master Services Agreement.pdf',page_count:3,shared_with:['anna@firma.pl'],review_status:'in_review',activity:[{type:'upload',label:'Document uploaded',detail:'File added and analyzed locally.'}],comments:[{author:'anna@firma.pl',body:'Sprawd?my jeszcze limit odpowiedzialno?ci przed podpisem.'}],summary:{overall_score:41,language:'en',summary:'Umowa obejmuje płatności, wypowiedzenie i odpowiedzialność.',risks:[{title:'Długi termin płatności',severity:'medium',explanation:'Płatność po 60 dniach może obciążać cash flow.'},{title:'Ograniczona odpowiedzialność',severity:'high',explanation:'Wyłączenia mogą utrudnić dochodzenie roszczeń.'}],suggestions:[{title:'Skróć termin płatności',rationale:'Poprawia płynność.',proposed_text:'Payment terms shall be net 30 days.'}]},fragments:[{id:'a',page:1,text:'Payment terms are net 60 days from invoice date.'},{id:'b',page:2,text:'Either party may terminate with 90 days written notice.'}]},
          {id:'demo-2',filename:'Supplier Agreement.pdf',page_count:2,shared_with:[],review_status:'approved',activity:[{type:'upload',label:'Document uploaded',detail:'File added and analyzed locally.'}],comments:[],summary:{overall_score:82,language:'en',summary:'Bez większych ryzyk.',risks:[],suggestions:[]},fragments:[{id:'c',page:1,text:'Payment terms are net 30 days.'},{id:'d',page:2,text:'Either party may terminate with 30 days written notice.'}]}
        ];
      }
      function current() { return documents.find(d => d.id === selectedId); }
      function visibleDocuments() {
        return documents.filter(d => {
          const matchesRisk = riskFilter === 'all' || d.summary.risks.some(risk => risk.severity === riskFilter);
          const matchesStatus = statusFilter === 'all' || d.review_status === statusFilter;
          return matchesRisk && matchesStatus;
        });
      }
      function renderSidebar() {
        const visible = visibleDocuments();
        if (!visible.some(d => d.id === selectedId)) selectedId = visible[0]?.id || null;
        $('documents').innerHTML = visible.length
          ? visible.map(d => `<button class="doc" data-id="${d.id}"><strong>${d.filename}</strong><br><span class="muted">${d.page_count} pages</span></button>`).join('')
          : '<p class="muted">No documents with this risk level.</p>';
        document.querySelectorAll('.doc').forEach(btn => btn.onclick = () => { selectedId = btn.dataset.id; renderDocument(); renderCompare(); renderSuggestions(); });
      }
      function renderOverview() {
        if (!documents.length) {
          $('overview').innerHTML = `<div class="panel"><h2>Start with your first contract</h2><p class="muted">Upload a PDF or TXT file to generate a summary, inspect risks, ask questions, and compare revisions.</p><button id="loadDemo">Load demo data</button></div>`;
          $('loadDemo').onclick = () => {
            documents = demoDocs();
            selectedId = documents[0].id;
            renderSidebar(); renderOverview(); renderDocument(); renderCompare(); renderSuggestions();
          };
          return;
        }
        const high = documents.filter(d => d.summary.risks.some(r => r.severity === 'high')).length;
        const avg = Math.round(documents.reduce((a,d)=>a+d.summary.overall_score,0)/documents.length);
        const shared = documents.filter(d => d.shared_with.length).length;
        const inReview = documents.filter(d => d.review_status === 'in_review').length;
        const approved = documents.filter(d => d.review_status === 'approved').length;
        const reviewQueue = documents.filter(d => d.review_status !== 'approved').sort((a,b)=>a.summary.overall_score-b.summary.overall_score);
        $('overview').innerHTML = `
          <div class="stats">
            <div class="panel stat">Documents<strong>${documents.length}</strong></div>
            <div class="panel stat">High risk<strong>${high}</strong></div>
            <div class="panel stat">Average score<strong>${avg}</strong></div>
            <div class="panel stat">Shared<strong>${shared}</strong></div>
            <div class="panel stat">In review<strong>${inReview}</strong></div>
            <div class="panel stat">Approved<strong>${approved}</strong></div>
          </div>
          <div class="panel">
            <h2>Portfolio-ready product dashboard</h2>
            ${documents.map(d=>`<div class="fragment"><strong>${d.filename}</strong><br><span class="muted">${d.summary.language.toUpperCase()} · score ${d.summary.overall_score}</span></div>`).join('')}
          </div>`;
      }
      function renderDocument() {
        const d = current();
        if (!d) {
          $('document').innerHTML = '';
          return;
        }
        $('document').innerHTML = `
          <div class="workspace">
            <div class="panel">
              <h2>${d.filename}</h2>
              ${d.fragments.map(f=>`<div class="fragment"><small>Page ${f.page}</small>${riskBadge(d, f)}<p>${f.text}</p></div>`).join('')}
            </div>
            <div class="stack">
              <div class="panel"><h3>AI Summary</h3><p>${d.summary.summary}</p></div>
              <div class="panel"><h3>Review status</h3><p><span class="tag">${statusLabel(d.review_status)}</span></p><button data-status="draft" class="statusButton">Draft</button><button data-status="in_review" class="statusButton">In review</button><button data-status="approved" class="statusButton">Approved</button></div>
              <div class="panel"><h3>Risk score · ${d.summary.overall_score}/100</h3>${d.summary.risks.map(r=>`<div class="risk"><strong>${r.title}</strong> <span class="tag">${r.severity}</span><p>${r.explanation}</p></div>`).join('') || '<p class="muted">Brak ryzyk.</p>'}</div>
              <div class="panel"><h3>Ask this contract</h3><div id="messages"></div><textarea id="question" placeholder="Np. jaki jest termin wypowiedzenia?"></textarea><button id="ask">Ask</button><p id="answer" class="fragment">Zadaj pytanie o dokument.</p><div id="citations"></div></div>
              <div class="panel"><h3>Share document</h3><input id="shareEmail" placeholder="email współpracownika"/><button id="share">Share</button><p class="muted">${d.shared_with.join(', ') || 'Jeszcze nikomu nie udostępniono.'}</p></div>
            </div>
          </div>`;
        document.querySelectorAll('.statusButton').forEach(button => button.onclick = async () => {
          const status = button.dataset.status;
          if (d.id.startsWith('demo-')) {
            d.review_status = status;
            d.activity.unshift({type:'status',label:'Review status updated',detail:`Status changed to ${status}.`});
          } else Object.assign(d, await api(`/api/documents/${d.id}/status`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})}));
          renderDocument();
        });
        $('ask').onclick = async () => {
          const currentQuestion = $('question').value.trim();
          if (!currentQuestion) return;
          messages.push({role:'user', content:currentQuestion});
          if (d.id.startsWith('demo-')) { 
            $('answer').textContent = d.fragments[0].text; 
            $('citations').innerHTML = citationMarkup([d.fragments[0]]);
            messages.push({role:'assistant', content:d.fragments[0].text});
            d.activity.unshift({type:'question',label:'Question asked',detail:currentQuestion});
            $('question').value = '';
            renderMessages();
            return; 
          }
          const res = await api(`/api/documents/${d.id}/ask`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:$('question').value})});
          $('answer').textContent = res.answer;
          $('citations').innerHTML = citationMarkup(res.citations || []);
          messages.push({role:'assistant', content:res.answer});
          d.activity.unshift({type:'question',label:'Question asked',detail:currentQuestion});
          $('question').value = '';
          renderMessages();
        };
        $('addComment').onclick = async () => {
          const body = $('commentBody').value.trim();
          if (!body) return;
          if (d.id.startsWith('demo-')) {
            d.comments.unshift({author:'reviewer@local', body});
            d.activity.unshift({type:'comment',label:'Comment added',detail:body});
          } else Object.assign(d, await api(`/api/documents/${d.id}/comments`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({author:'reviewer@local',body})}));
          renderDocument();
        };
        $('share').onclick = async () => {
          const email = $('shareEmail').value;
          if (!email) return;
          if (d.id.startsWith('demo-')) {
            d.shared_with.push(email);
            d.activity.unshift({type:'share',label:'Document shared',detail:`Shared with ${email}.`});
          }
          else Object.assign(d, await api(`/api/documents/${d.id}/share`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}));
          renderDocument(); renderOverview();
        };
        $('report').onclick = async () => {
          const res = d.id.startsWith('demo-') ? buildDemoReport(d) : await api(`/api/documents/${d.id}/report`);
          $('reportOutput').textContent = res.markdown;
          $('downloadReport').onclick = () => downloadMarkdown(res);
        };
      }
      function renderCompare() {
        const d = current();
        if (!d) {
          $('compare').innerHTML = '';
          return;
        }
        $('compare').innerHTML = `
          <div class="panel">
            <h2>Compare contracts</h2>
            <select id="other">${documents.map(x=>`<option value="${x.id}">${x.filename}</option>`).join('')}</select>
            <button id="runCompare">Compare</button>
            <div id="compareResult"></div>
          </div>`;
        $('runCompare').onclick = async () => {
          const otherId = $('other').value;
          let res;
          if (d.id.startsWith('demo-') || otherId.startsWith('demo-')) res = {summary:'Znaleziono 2 istotne różnice.',differences:[{category:'payment',left_text:'net 60',right_text:'net 30',impact:'Wpływ na cash flow.'},{category:'termination',left_text:'90 days',right_text:'30 days',impact:'Wpływ na elastyczność.'}]};
          else res = await api('/api/compare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({left_id:d.id,right_id:otherId})});
          d.activity.unshift({type:'compare',label:'Compared with another contract',detail:`Compared with ${documents.find(x => x.id === otherId)?.filename || 'another document'}.`});
          $('compareResult').innerHTML = `
            <div class="difference">
              <strong>${res.differences.length} changes found</strong>
              <p>${res.summary}</p>
              <p>${res.differences.map(x => `<span class="tag">${x.category}</span>`).join('')}</p>
            </div>
            ${res.differences.map(x=>`<div class="difference"><strong>${x.category}</strong><p>${x.left_text} → ${x.right_text}</p><small>${x.impact}</small></div>`).join('')}`;
        };
      }
      function renderSuggestions() {
        const d = current();
        if (!d) {
          $('suggestions').innerHTML = '';
          return;
        }
        $('suggestions').innerHTML = `<div class="panel"><h2>AI suggestions</h2>${d.summary.suggestions.map(s=>`<div class="suggestion"><strong>${s.title}</strong><p>${s.rationale}</p><pre>${s.proposed_text}</pre></div>`).join('') || '<p class="muted">Brak sugestii wymagających zmiany.</p>'}</div>`;
      }
      function citationMarkup(items) {
        if (!items.length) return '';
        return `<h4>Supporting passages</h4>${items.map(item => `<div class="fragment"><small>Page ${item.page}</small><p>${item.text}</p></div>`).join('')}`;
      }
      function buildDemoReport(document) {
        const risks = document.summary.risks.length
          ? document.summary.risks.map(risk => `- **${risk.title}** (${risk.severity}) ? ${risk.explanation}`).join('\n')
          : '- No material risks detected.';
        const suggestions = document.summary.suggestions.length
          ? document.summary.suggestions.map(suggestion => `- **${suggestion.title}** ? ${suggestion.rationale}\n  - Suggested text: \`${suggestion.proposed_text}\``).join('\n')
          : '- No suggested edits.';
        const passages = document.fragments.slice(0,3).map(fragment => `- Page ${fragment.page}: ${fragment.text}`).join('\n');
        return { filename: document.filename, markdown: `# Contract Review Report\n\n## Document\n${document.filename}\n\n## Executive summary\n${document.summary.summary}\n\n## Risk score\n${document.summary.overall_score}/100\n\n## Key risks\n${risks}\n\n## Suggested edits\n${suggestions}\n\n## Supporting passages\n${passages}` };
      }
      function activityMarkup(document) {
        return document.activity?.length
          ? document.activity.slice(0,5).map(item => `<div class="fragment"><strong>${item.label}</strong><p>${item.detail}</p></div>`).join('')
          : '<p class="muted">No activity yet.</p>';
      }
      function commentMarkup(document) {
        return document.comments?.length
          ? document.comments.map(comment => `<div class="fragment"><strong>${comment.author}</strong><p>${comment.body}</p></div>`).join('')
          : '<p class="muted">No comments yet.</p>';
      }
      function statusLabel(status) {
        return ({draft:'Draft',in_review:'In review',approved:'Approved'})[status] || status;
      }
      function downloadMarkdown(report) {
        const blob = new Blob([report.markdown], {type:'text/markdown;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${report.filename.replace(/\.[^.]+$/, '')}-report.md`;
        link.click();
        URL.revokeObjectURL(url);
      }
      function riskBadge(document, fragment) {
        const markers = {
          payment:['net 60','net 90','within sixty','within ninety'],
          termination:['90 days','terminate for convenience'],
          liability:['limitation of liability','indirect damages','consequential'],
          renewal:['automatic renewal','auto-renew'],
          confidentiality:['confidentiality','confidential information','non-disclosure']
        };
        const risk = document.summary.risks.find(risk => (markers[risk.category] || []).some(marker => fragment.text.toLowerCase().includes(marker)));
        return risk ? `<div class="tag">Risk: ${risk.title}</div>` : '';
      }
      function renderMessages() {
        $('messages').innerHTML = messages.map(message => `<div class="fragment">${message.role === 'user' ? 'You: ' : 'Assistant: '}${message.content}</div>`).join('');
      }
      document.querySelectorAll('.nav button').forEach(btn => btn.onclick = () => {
        document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active')); btn.classList.add('active');
        ['overview','document','compare','suggestions'].forEach(id => $(id).classList.toggle('hidden', id !== btn.dataset.view));
      });
      document.querySelectorAll('.filters button').forEach(btn => btn.onclick = () => {
        if (btn.dataset.risk) {
          riskFilter = btn.dataset.risk;
          document.querySelectorAll('[data-risk]').forEach(x => x.classList.toggle('active', x === btn));
        }
        if (btn.dataset.status) {
          statusFilter = btn.dataset.status;
          document.querySelectorAll('[data-status]').forEach(x => x.classList.toggle('active', x === btn));
        }
        renderSidebar(); renderDocument(); renderCompare(); renderSuggestions();
      });
      $('file').onchange = async (event) => {
        const form = new FormData(); form.append('file', event.target.files[0]);
        const created = await api('/api/documents/upload', {method:'POST', body:form});
        documents.unshift(created); selectedId = created.id; renderSidebar(); renderOverview(); renderDocument(); renderCompare(); renderSuggestions();
      };
      load();
    </script>
  </body>
</html>
