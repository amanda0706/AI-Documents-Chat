<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClausePilot</title>
    <style>
      :root { --bg:#f4f7fb; --ink:#172033; --line:#dbe3ee; --accent:#3f6ff2; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--ink); }
      .app { display:grid; grid-template-columns:250px 1fr; gap:20px; min-height:100vh; padding:20px; }
      .panel { background:#fff; border-radius:28px; padding:20px; box-shadow:0 18px 48px rgba(23,32,51,.08); }
      .brand { font-size:28px; font-weight:700; margin-bottom:24px; }
      button,.upload { border:0; border-radius:16px; padding:14px 16px; cursor:pointer; font:inherit; }
      .upload { display:block; text-align:center; color:#fff; background:var(--accent); margin-bottom:20px; }
      .nav button,.doc { width:100%; text-align:left; background:#f8fafc; margin-bottom:8px; }
      .nav button.active { background:#111827; color:#fff; }
      .workspace { display:grid; grid-template-columns:1fr 360px; gap:20px; }
      .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:20px; }
      .stat strong { display:block; margin-top:10px; font-size:32px; }
      .fragment,.risk,.suggestion,.difference { background:#f8fafc; border-radius:22px; padding:16px; margin-top:12px; }
      input,textarea,select { width:100%; border:1px solid var(--line); border-radius:16px; padding:14px; font:inherit; }
      textarea { min-height:100px; }
      .stack > * + * { margin-top:12px; }
      .tag { display:inline-block; padding:6px 10px; border-radius:999px; background:#fff3cd; margin-right:8px; font-size:12px; }
      .muted { color:#64748b; }
      .hidden { display:none; }
      @media (max-width: 980px) {
        .app,.workspace,.stats { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <div class="brand">ClausePilot</div>
        <label class="upload">Upload document<input id="file" type="file" accept=".pdf" hidden /></label>
        <nav class="nav">
          <button data-view="overview" class="active">Dashboard</button>
          <button data-view="document">Document</button>
          <button data-view="compare">Compare</button>
          <button data-view="suggestions">Suggestions</button>
        </nav>
        <h4>Documents</h4>
        <div id="documents"></div>
      </aside>
      <section>
        <div id="overview"></div>
        <div id="document" class="hidden"></div>
        <div id="compare" class="hidden"></div>
        <div id="suggestions" class="hidden"></div>
      </section>
    </main>
    <script>
      let documents = [];
      let selectedId = null;
      const $ = (id) => document.getElementById(id);
      async function api(path, options) { const r = await fetch(path, options); return r.json(); }
      async function load() {
        try { documents = await api('/api/documents'); }
        catch { documents = []; }
        if (!documents.length) documents = demoDocs();
        selectedId ||= documents[0]?.id;
        renderSidebar(); renderOverview(); renderDocument(); renderCompare(); renderSuggestions();
      }
      function demoDocs() {
        return [
          {id:'demo-1',filename:'Master Services Agreement.pdf',page_count:3,shared_with:['anna@firma.pl'],summary:{overall_score:41,language:'en',summary:'Umowa obejmuje płatności, wypowiedzenie i odpowiedzialność.',risks:[{title:'Długi termin płatności',severity:'medium',explanation:'Płatność po 60 dniach może obciążać cash flow.'},{title:'Ograniczona odpowiedzialność',severity:'high',explanation:'Wyłączenia mogą utrudnić dochodzenie roszczeń.'}],suggestions:[{title:'Skróć termin płatności',rationale:'Poprawia płynność.',proposed_text:'Payment terms shall be net 30 days.'}]},fragments:[{id:'a',page:1,text:'Payment terms are net 60 days from invoice date.'},{id:'b',page:2,text:'Either party may terminate with 90 days written notice.'}]},
          {id:'demo-2',filename:'Supplier Agreement.pdf',page_count:2,shared_with:[],summary:{overall_score:82,language:'en',summary:'Bez większych ryzyk.',risks:[],suggestions:[]},fragments:[{id:'c',page:1,text:'Payment terms are net 30 days.'},{id:'d',page:2,text:'Either party may terminate with 30 days written notice.'}]}
        ];
      }
      function current() { return documents.find(d => d.id === selectedId); }
      function renderSidebar() {
        $('documents').innerHTML = documents.map(d => `<button class="doc" data-id="${d.id}"><strong>${d.filename}</strong><br><span class="muted">${d.page_count} pages</span></button>`).join('');
        document.querySelectorAll('.doc').forEach(btn => btn.onclick = () => { selectedId = btn.dataset.id; renderDocument(); renderCompare(); renderSuggestions(); });
      }
      function renderOverview() {
        const high = documents.filter(d => d.summary.risks.some(r => r.severity === 'high')).length;
        const avg = Math.round(documents.reduce((a,d)=>a+d.summary.overall_score,0)/documents.length);
        const shared = documents.filter(d => d.shared_with.length).length;
        $('overview').innerHTML = `
          <div class="stats">
            <div class="panel stat">Documents<strong>${documents.length}</strong></div>
            <div class="panel stat">High risk<strong>${high}</strong></div>
            <div class="panel stat">Average score<strong>${avg}</strong></div>
            <div class="panel stat">Shared<strong>${shared}</strong></div>
          </div>
          <div class="panel">
            <h2>Portfolio-ready product dashboard</h2>
            ${documents.map(d=>`<div class="fragment"><strong>${d.filename}</strong><br><span class="muted">${d.summary.language.toUpperCase()} · score ${d.summary.overall_score}</span></div>`).join('')}
          </div>`;
      }
      function renderDocument() {
        const d = current();
        $('document').innerHTML = `
          <div class="workspace">
            <div class="panel">
              <h2>${d.filename}</h2>
              ${d.fragments.map(f=>`<div class="fragment"><small>Page ${f.page}</small><p>${f.text}</p></div>`).join('')}
            </div>
            <div class="stack">
              <div class="panel"><h3>AI Summary</h3><p>${d.summary.summary}</p></div>
              <div class="panel"><h3>Risk score · ${d.summary.overall_score}/100</h3>${d.summary.risks.map(r=>`<div class="risk"><strong>${r.title}</strong> <span class="tag">${r.severity}</span><p>${r.explanation}</p></div>`).join('') || '<p class="muted">Brak ryzyk.</p>'}</div>
              <div class="panel"><h3>Ask this contract</h3><textarea id="question" placeholder="Np. jaki jest termin wypowiedzenia?"></textarea><button id="ask">Ask</button><p id="answer" class="fragment">Zadaj pytanie o dokument.</p><div id="citations"></div></div>
              <div class="panel"><h3>Share document</h3><input id="shareEmail" placeholder="email współpracownika"/><button id="share">Share</button><p class="muted">${d.shared_with.join(', ') || 'Jeszcze nikomu nie udostępniono.'}</p></div>
            </div>
          </div>`;
        $('ask').onclick = async () => {
          if (d.id.startsWith('demo-')) { $('answer').textContent = d.fragments[0].text; $('citations').innerHTML = citationMarkup([d.fragments[0]]); return; }
          const res = await api(`/api/documents/${d.id}/ask`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:$('question').value})});
          $('answer').textContent = res.answer;
          $('citations').innerHTML = citationMarkup(res.citations || []);
        };
        $('share').onclick = async () => {
          const email = $('shareEmail').value;
          if (!email) return;
          if (d.id.startsWith('demo-')) d.shared_with.push(email);
          else Object.assign(d, await api(`/api/documents/${d.id}/share`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}));
          renderDocument(); renderOverview();
        };
      }
      function renderCompare() {
        const d = current();
        $('compare').innerHTML = `
          <div class="panel">
            <h2>Compare contracts</h2>
            <select id="other">${documents.map(x=>`<option value="${x.id}">${x.filename}</option>`).join('')}</select>
            <button id="runCompare">Compare</button>
            <div id="compareResult"></div>
          </div>`;
        $('runCompare').onclick = async () => {
          const otherId = $('other').value;
          let res;
          if (d.id.startsWith('demo-') || otherId.startsWith('demo-')) res = {summary:'Znaleziono 2 istotne różnice.',differences:[{category:'payment',left_text:'net 60',right_text:'net 30',impact:'Wpływ na cash flow.'},{category:'termination',left_text:'90 days',right_text:'30 days',impact:'Wpływ na elastyczność.'}]};
          else res = await api('/api/compare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({left_id:d.id,right_id:otherId})});
          $('compareResult').innerHTML = `<p>${res.summary}</p>${res.differences.map(x=>`<div class="difference"><strong>${x.category}</strong><p>${x.left_text} → ${x.right_text}</p><small>${x.impact}</small></div>`).join('')}`;
        };
      }
      function renderSuggestions() {
        const d = current();
        $('suggestions').innerHTML = `<div class="panel"><h2>AI suggestions</h2>${d.summary.suggestions.map(s=>`<div class="suggestion"><strong>${s.title}</strong><p>${s.rationale}</p><pre>${s.proposed_text}</pre></div>`).join('') || '<p class="muted">Brak sugestii wymagających zmiany.</p>'}</div>`;
      }
      function citationMarkup(items) {
        if (!items.length) return '';
        return `<h4>Supporting passages</h4>${items.map(item => `<div class="fragment"><small>Page ${item.page}</small><p>${item.text}</p></div>`).join('')}`;
      }
      document.querySelectorAll('.nav button').forEach(btn => btn.onclick = () => {
        document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active')); btn.classList.add('active');
        ['overview','document','compare','suggestions'].forEach(id => $(id).classList.toggle('hidden', id !== btn.dataset.view));
      });
      $('file').onchange = async (event) => {
        const form = new FormData(); form.append('file', event.target.files[0]);
        const created = await api('/api/documents/upload', {method:'POST', body:form});
        documents.unshift(created); selectedId = created.id; renderSidebar(); renderOverview(); renderDocument(); renderCompare(); renderSuggestions();
      };
      load();
    </script>
  </body>
</html>
